name: receipt_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0
  google_mlkit_text_recognition: ^0.15.1
  path_provider: ^2.1.6
  pdf: ^3.12.0
  excel: ^4.0.6
  share_plus: ^13.2.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ── Native splash screen ───────────────────────────────────────────────────────

# ── Launcher icon ──────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

# ── Flutter ────────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/icon/